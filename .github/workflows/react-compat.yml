name: React Compatibility Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-react-compatibility:
    name: Test React ${{ matrix.react-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        react-version: ['18', '19']
        include:
          - react-version: '18'
            react: '^18.3.1'
            react-dom: '^18.3.1'
            types-react: '^18.0.0'
            types-react-dom: '^18.0.0'
          - react-version: '19'
            react: '^19.2.1'
            react-dom: '^19.2.1'
            types-react: '^19.0.0'
            types-react-dom: '^19.0.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install React ${{ matrix.react-version }}
        working-directory: packages/console-feed
        # peerDependencies(@emotion/*, react-inspector)는 monorepo 안의 다른 패키지
        # (apps/demo가 React 19로 핀)가 hoist 시켜둔 React 19 매칭에 묶여 있다.
        # packages/console-feed에 React 18만 add 하면 emotion/react-inspector의 peer는
        # React 19에 묶인 채라 다중 React 인스턴스가 발생한다. 그래서 emotion/react-inspector도
        # 함께 dev install로 add해서 매트릭스용 React 매칭 인스턴스가 별도로 만들어지도록 강제.
        run: |
          pnpm add -D \
            react@${{ matrix.react }} \
            react-dom@${{ matrix.react-dom }} \
            @types/react@${{ matrix.types-react }} \
            @types/react-dom@${{ matrix.types-react-dom }} \
            @emotion/react \
            @emotion/styled \
            react-inspector

      - name: Verify React version
        working-directory: packages/console-feed
        run: |
          echo "Installed React version:"
          pnpm list react react-dom

      - name: Build
        working-directory: packages/console-feed
        run: pnpm build

      - name: Run tests
        working-directory: packages/console-feed
        run: pnpm test

      - name: Verify dist runtime shapes
        working-directory: packages/console-feed
        run: pnpm test:dist

      - name: Lint
        if: matrix.react-version == '19'
        run: pnpm lint

      - name: Format check
        if: matrix.react-version == '19'
        run: pnpm format:check

      - name: Type check
        if: matrix.react-version == '19'
        working-directory: packages/console-feed
        run: pnpm exec tsc --noEmit

      - name: Build demo (React ${{ matrix.react-version }} only)
        if: matrix.react-version == '19'
        working-directory: apps/demo
        run: pnpm build

  test-summary:
    name: React Compatibility Summary
    needs: test-react-compatibility
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-react-compatibility.result }}" == "success" ]; then
            echo "✅ All React compatibility tests passed!"
            echo "Tested: React 18 & React 19"
          else
            echo "❌ Some tests failed"
            exit 1
          fi
